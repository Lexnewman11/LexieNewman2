<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Materialize Button Example</title>

    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!-- Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>

<body class="container">

    <h3 class="center-align">Materialize Button Example</h3>

    <!-- Basic Button -->
    <a class="waves-effect waves-light btn">Basic Button</a>

    <br><br>

    <!-- Colored Button -->
    <a class="waves-effect waves-light btn blue">Blue Button</a>

    <br><br>

    <!-- Large Button -->
    <a class="waves-effect waves-light btn-large red">Large Button</a>
    <br><br>

    <!-- Disabled Button -->
    <a class="btn disabled">Disabled Button</a>

    <br><br>

    <!-- Button with Icon -->
    <a class="waves-effect waves-light btn">
        Click Me
        <i class="material-icons right">send</i>
    </a>

    <!-- Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <!-- Google Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</body>
</html>
